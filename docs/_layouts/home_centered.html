<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
  {%- include head.html -%}

  <body style="min-height: 100vh; display: flex; flex-direction: column;">
    {%- include header.html -%}

    <main
      class="page-content"
      aria-label="Content"
      style="flex: 1; display: flex; align-items: center;"
    >
      <div class="wrapper" style="width: 100%;">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}
  </body>
</html>
